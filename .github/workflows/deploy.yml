name: Deploy to VPS

# Bei jedem Push auf master automatisch deployen.
# "workflow_dispatch" erlaubt zusätzlich manuelles Auslösen über die
# GitHub-Oberfläche (Tab "Actions" -> "Deploy to VPS" -> "Run workflow").
on:
  push:
    branches: [master]
  workflow_dispatch:

# Verhindert, dass sich zwei Deploys überholen, wenn schnell hintereinander
# gepusht wird. Laufende Deploys werden nicht abgebrochen, neue warten.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Per SSH auf der VPS neu bauen
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.VPS_APP_DIR || '/opt/dreicount' }}
            bash deploy/update.sh
