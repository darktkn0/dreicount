# /etc/nginx/sites-available/dreicount
# HTTPS mit eigenem (IONOS-)Zertifikat - kein certbot.

# HTTP -> HTTPS umleiten
server {
    listen 80;
    listen [::]:80;
    server_name dreicount.domain.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dreicount.domain.de;

    # IONOS-Zertifikat:
    #  fullchain.pem = Server-Zertifikat + CA-Bundle (in dieser Reihenfolge)
    #  privkey.pem   = privater Schlüssel
    ssl_certificate     /etc/nginx/ssl/dreicount/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/dreicount/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 128k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
